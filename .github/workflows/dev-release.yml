name: Development Release

on:
  push:
    branches:
      - main
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Create empty google-services.json if missing
        run: |
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"0","project_id":"echo-dummy","storage_bucket":"echo-dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"dev.brahmkshatriya.echo"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json
          fi

      - name: Cook and validate KeyStore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          SIGNING_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$KEYSTORE_B64" ]; then
            echo "KEYSTORE_B64 secret is empty. Nightly will be unsigned."
            exit 0
          fi
          printf '%s' "$KEYSTORE_B64" | tr -d '\r\n' | base64 -d > "$GITHUB_WORKSPACE/signing-key.jks"
          KEYSTORE_MAGIC="$(od -An -tx1 -N4 "$GITHUB_WORKSPACE/signing-key.jks" | tr -d ' \n')"
          case "$KEYSTORE_MAGIC" in
            feedfeed) echo "SIGNING_STORE_TYPE=JKS" >> "$GITHUB_ENV" ;;
            30*) echo "SIGNING_STORE_TYPE=PKCS12" >> "$GITHUB_ENV" ;;
          esac

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APKs
        shell: bash
        env:
          SIGNING_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          # Build Debug (always unsigned)
          ./gradlew assembleDebug
          
          # Build Nightly (signed if keystore exists)
          if [ -f "$GITHUB_WORKSPACE/signing-key.jks" ]; then
            ./gradlew assembleNightly \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing-key.jks" \
            -Pandroid.injected.signing.store.type="$SIGNING_STORE_TYPE" \
            -Pandroid.injected.signing.store.password="$SIGNING_PASSWORD" \
            -Pandroid.injected.signing.key.alias=key0 \
            -Pandroid.injected.signing.key.password="$SIGNING_PASSWORD" || echo "Nightly build failed"
          else
            ./gradlew assembleNightly || echo "Nightly build failed"
          fi

      - name: Prepare Artifacts
        id: prep
        run: |
          git_count=$(git rev-list --count HEAD)
          git_hash=$(git rev-parse --short=7 HEAD)
          version="3.0.$git_count"
          echo "VERSION_NAME=v${version}_$git_hash($git_count)" >> $GITHUB_ENV
          echo "GIT_HASH=$git_hash" >> $GITHUB_ENV
          
          mkdir -p release_artifacts
          
          # Copy Debug APK
          debug_apk=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -n "$debug_apk" ]; then
            cp "$debug_apk" "release_artifacts/echo-v${version}_debug.apk"
          fi
          
          # Copy Nightly APK
          nightly_apk=$(find app/build/outputs/apk/nightly -name "*.apk" | head -n 1)
          if [ -n "$nightly_apk" ]; then
            cp "$nightly_apk" "release_artifacts/echo-v${version}_nightly.apk"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ env.GIT_HASH }}
          name: Dev Build ${{ env.VERSION_NAME }}
          prerelease: true
          make_latest: false
          body: |
            Automated Development Build
            Version: ${{ env.VERSION_NAME }}
            Commit: ${{ github.sha }}
            
            Latest changes:
            ${{ github.event.head_commit.message }}
          files: release_artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
