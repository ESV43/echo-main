name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build KMP Shared Framework
      run: ./gradlew :common:assembleCommonReleaseXCFramework --info

    - name: Install Apple Certificate (Optional - for real devices)
      # This step requires setting up secrets for signing. 
      # For feasibility testing, we can build for 'Simulator' which doesn't require signing.
      run: |
        echo "If building for real device, setup P12 and MobileProvision here."

    - name: Build Xcode Project
      run: |
        xcodebuild -project apple/iosApp/iosApp.xcodeproj \
                   -scheme iosApp \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $PWD/build/iosApp.xcarchive \
                   archive \
                   CODE_SIGNING_ALLOWED=NO

    - name: Export IPA
      run: |
        # Note: Exporting IPA without signing usually requires a dummy plist or Enterprise cert.
        # For testing, we output the .app bundle inside the archive.
        mkdir -p build/artifacts
        cp -r build/iosApp.xcarchive/Products/Applications/iosApp.app build/artifacts/
        zip -r build/artifacts/Echo_iOS.ipa build/artifacts/iosApp.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Echo-iOS-Beta
        path: build/artifacts/Echo_iOS.ipa
