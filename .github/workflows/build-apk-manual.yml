name: Manual Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - stable
          - nightly

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream at last stable commit
        uses: actions/checkout@v4
        with:
          # Build from the upstream repo at a known-good commit.
          # Your fork (ESV43/echo-main) doesn't contain upstream commits,
          # so we pull directly from brahmkshatriya/echo instead.
          # To find a newer stable commit: https://github.com/brahmkshatriya/echo/actions
          repository: brahmkshatriya/echo
          ref: bb731bbe06e70862d77b07a2e04c3b8a4e91e5aa
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Create empty google-services.json if missing
        run: |
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"0","project_id":"echo-dummy","storage_bucket":"echo-dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"dev.brahmkshatriya.echo"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assemble${{ github.event.inputs.build_type }} --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ github.event.inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
