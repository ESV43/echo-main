name: Manual Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - stable
          - nightly

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Create empty google-services.json if missing
        run: |
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"0","project_id":"echo-dummy","storage_bucket":"echo-dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"dev.brahmkshatriya.echo"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json
          fi

      - name: Cook KeyStore
        if: github.event.inputs.build_type != 'debug'
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > $GITHUB_WORKSPACE/signing-key.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        shell: bash
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          GRADLE_TASK="assemble${BUILD_TYPE^}"

          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew "$GRADLE_TASK" --stacktrace
          else
            ./gradlew "$GRADLE_TASK" --stacktrace \
              -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing-key.jks" \
              -Pandroid.injected.signing.store.password="${{ secrets.PASSWORD }}" \
              -Pandroid.injected.signing.key.alias=key0 \
              -Pandroid.injected.signing.key.password="${{ secrets.PASSWORD }}"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ github.event.inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
