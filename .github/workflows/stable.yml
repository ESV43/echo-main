name: stable

on:
  push:
    tags:
      - '*'
  workflow_dispatch: { }

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
      COMMIT: $( sed -E "s/(.*) <.*@.*>/\\1/g;t" <<< "${{ github.event.head_commit.message }}" | jq -Rsa . | tail -c +2 | head -c -2 )
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: 'gradle'

      - name: Cook and validate KeyStore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          SIGNING_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$KEYSTORE_B64" ]; then
            echo "KEYSTORE_B64 secret is empty." >&2
            exit 1
          fi

          printf '%s' "$KEYSTORE_B64" | tr -d '\r\n' | base64 -d > "$GITHUB_WORKSPACE/signing-key.jks"

          if [ ! -s "$GITHUB_WORKSPACE/signing-key.jks" ]; then
            echo "Decoded keystore is empty. Recreate KEYSTORE_B64 from the binary keystore file." >&2
            exit 1
          fi

          if ! keytool -list -keystore "$GITHUB_WORKSPACE/signing-key.jks" -storepass "$SIGNING_PASSWORD" -alias key0 >/dev/null; then
            echo "Decoded keystore cannot be read with PASSWORD and alias key0." >&2
            echo "Recreate KEYSTORE_B64 with: base64 -w 0 signing-key.jks" >&2
            exit 1
          fi

          KEYSTORE_MAGIC="$(od -An -tx1 -N4 "$GITHUB_WORKSPACE/signing-key.jks" | tr -d ' \n')"
          case "$KEYSTORE_MAGIC" in
            feedfeed) echo "SIGNING_STORE_TYPE=JKS" >> "$GITHUB_ENV" ;;
            30*) echo "SIGNING_STORE_TYPE=PKCS12" >> "$GITHUB_ENV" ;;
            *)
              echo "Decoded keystore has an unsupported file header." >&2
              exit 1
              ;;
          esac

      - name: Cook Google Services
        shell: bash
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}
        run: printf '%s' "$GOOGLE_SERVICES_B64" | tr -d '\r\n' | base64 -d > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        shell: bash
        env:
          SIGNING_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          ./gradlew assembleStable \
          -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/signing-key.jks" \
          -Pandroid.injected.signing.store.type="$SIGNING_STORE_TYPE" \
          -Pandroid.injected.signing.store.password="$SIGNING_PASSWORD" \
          -Pandroid.injected.signing.key.alias=key0 \
          -Pandroid.injected.signing.key.password="$SIGNING_PASSWORD"
          
          mkdir -p release_artifacts
          apk_path=$(find app/build/outputs/apk/stable -name "*.apk" | head -n 1)
          cp "$apk_path" "release_artifacts/echo-${{ env.VERSION }}_stable.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          path: release_artifacts/echo-${{ env.VERSION }}_stable.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          body: ${{ env.COMMIT }}
          files: release_artifacts/echo-${{ env.VERSION }}_stable.apk

      - name: Upload APK to Discord
        shell: bash
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
        run: |
          message=$(echo "@everyone **${{ env.VERSION }}**\n${{ env.COMMIT }}")
          curl -F "payload_json={\"content\":\"${message}\"}" \
          -F "echo_beta=@release_artifacts/echo-${{ env.VERSION }}_stable.apk" \
          ${{ env.WEBHOOK }}

      - name: Upload APK to Telegram
        shell: bash
        env:
          BOT_ID: ${{ secrets.TELEGRAM_BOT_ID }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          regex='s/[\_\*\[\]\(\)\~\`\>\#\+\-\=\|\{\}\.\!]/\\&/g'
          message=$(printf "${{ env.COMMIT }}" | sed -E "$regex")
          curl -F "chat_id=${{ env.CHANNEL_ID }}" \
          -F "message_thread_id=${{ env.THREAD_ID }}" \
          -F "document=@release_artifacts/echo-${{ env.VERSION }}_stable.apk" \
          -F "caption=${message}" \
          -F "parse_mode=MarkdownV2" \
          https://api.telegram.org/bot${{ env.BOT_ID }}/sendDocument
